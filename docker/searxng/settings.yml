# SearxNG 配置
# 文档: https://docs.searxng.org/admin/settings/settings.html
# use_default_settings 继承镜像默认配置，此处仅覆盖差异项

use_default_settings: true

server:
  # 生产环境请更换此 secret_key（可用 `openssl rand -hex 32` 生成）
  secret_key: "a3f7b2e9c1d8e4f6a2b5c9d1e7f3a4b8c6d2e9f5a1b7c3d8e4f6a2b5c9d1e7f3"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false          # 私有实例，关闭对调用方的限流
  public_instance: false

search:
  # 开启 JSON API 输出（默认仅 html，必须显式开启才能用 format=json）
  formats:
    - html
    - json

outgoing:
  # 单引擎请求超时（秒），避免某个引擎卡住拖慢整体响应
  request_timeout: 3.0
  max_request_timeout: 10.0
  # 代理：通过宿主机代理访问 google/bing 等境外引擎
  # host.docker.internal 指向宿主机（docker-compose 里已配 extra_hosts 兼容各平台）
  # 代理端口变化时改这里，然后 docker compose restart
  proxies:
    all://: 'http://host.docker.internal:10902'

# 显式启用目标引擎（确保 baidu 等非默认引擎可用）
engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: baidu
    disabled: false
